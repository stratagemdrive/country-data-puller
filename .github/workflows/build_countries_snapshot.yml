name: Build Countries Snapshot

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/build_countries_snapshot.py"
      - ".github/workflows/build_countries_snapshot.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # ── 4. Ensure output directory exists ────────────────────────────────────
      - name: Create public/ directory
        run: mkdir -p public

      # ── 5. Run the snapshot builder ──────────────────────────────────────────
      - name: Build countries_snapshot.json
        run: |
          python scripts/build_countries_snapshot.py
        env:
          PYTHONUNBUFFERED: "1"

      # ── 6. Verify output ──────────────────────────────────────────────────────
      - name: Verify output file
        run: |
          if [ ! -f public/countries_snapshot.json ]; then
            echo "ERROR: public/countries_snapshot.json was not created"
            exit 1
          fi
          SIZE=$(wc -c < public/countries_snapshot.json)
          echo "Output file size: ${SIZE} bytes"
          if [ "$SIZE" -lt 10000 ]; then
            echo "ERROR: Output file suspiciously small (${SIZE} bytes) — possible build failure"
            exit 1
          fi
          python -c "
          import json, sys

          with open('public/countries_snapshot.json') as f:
              data = json.load(f)

          countries = data.get('countries', [])
          print(f'Country count: {len(countries)}')
          print(f'Generated at:  {data.get(\"generatedAt\")}')

          errors = []
          non_competitive_count = 0
          missing_exec = []
          missing_leg_next = []

          for c in countries:
              iso2 = c.get('iso2', '?')
              name = c.get('country', '?')

              # Executive sanity
              hos = c.get('executive', {}).get('headOfState', {}).get('name')
              if not hos:
                  missing_exec.append(f'{name} ({iso2}): missing headOfState.name')

              # Election schema sanity (new structure)
              elec = c.get('elections', {})
              if elec.get('competitiveElections') is False:
                  non_competitive_count += 1
                  if not elec.get('nonCompetitiveReason'):
                      errors.append(f'{name} ({iso2}): non-competitive but missing reason')
              else:
                  leg = elec.get('legislative', {})
                  leg_next = leg.get('nextElection')
                  if leg_next is None:
                      missing_leg_next.append(f'{name} ({iso2})')

          print(f'Non-competitive countries: {non_competitive_count}')
          print(f'Countries missing nextElection: {len(missing_leg_next)}')
          if missing_leg_next:
              for m in missing_leg_next:
                  print(f'  - {m}')

          if missing_exec:
              print(\"WARNINGS — missing executive data:\")
              for w in missing_exec:
                  print(f'  - {w}')

          if errors:
              print(\"ERRORS:\")
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)

          # Spot-check first country
          first = countries[0]
          print()
          print(f'Spot-check: {first[\"country\"]} ({first[\"iso2\"]})')
          print(f'  headOfState:   {first.get(\"executive\", {}).get(\"headOfState\", {}).get(\"name\")}')
          print(f'  competitiveElections: {first.get(\"elections\", {}).get(\"competitiveElections\")}')
          leg = first.get('elections', {}).get('legislative', {})
          last = leg.get('lastElection') or {}
          nxt  = leg.get('nextElection') or {}
          print(f'  lastElection:  {last.get(\"date\")} ({last.get(\"type\")})')
          print(f'  nextElection:  {nxt.get(\"date\")} ({nxt.get(\"type\")})')
          print('Verification passed.')
          "

      # ── 7. Commit snapshot back to main ───────────────────────────────────────
      - name: Commit updated snapshot to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/countries_snapshot.json
          if git diff --cached --quiet; then
            echo "No changes to commit — snapshot unchanged."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            git commit -m "chore: auto-update countries_snapshot.json [${TIMESTAMP}]"
            git push
          fi

      # ── 8. Upload artifact for GitHub Pages ───────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  # ── 9. Deploy to GitHub Pages ─────────────────────────────────────────────────
  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
